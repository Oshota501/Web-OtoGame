<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div id="pixi-container"></div>

        <div style="position:fixed;">
            <button id="music-start">Start</button><br>
            Width: <input id="chart-setting-range" type="number" value="0.5"><br>
            Half: <input id="chart-setting-number-of-half" type="number" value="30"><br>
            Quanter: <input id="chart-setting-number-of-quanter" type="number" value="0"><br>
            Triplet: <input id="chart-setting-number-of-triplet" type="number" value="0"><br>
        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
